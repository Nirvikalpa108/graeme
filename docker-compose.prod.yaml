services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_SSLMODE: ${DB_SSLMODE}
    command: ./entrypoint.sh

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "8501:8501"
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_SSLMODE: ${DB_SSLMODE}
    command: streamlit run src/ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.fileWatcherType none
